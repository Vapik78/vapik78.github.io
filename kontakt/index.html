<section class="contact-hero">

  <h1>KONTAKT</h1>

  <p>
    Pokud mi chcete něco napsat feel free to do so, rád si přečtu vaše zprávy a odpovím na ně co nejdříve

  </p>

</section>

<section class="contact-container">

  <div class="contact-grid">

    <a href="https://instagram.com/marek_bures78"
   target="_blank"
   class="social-card">

  <img src="../obrazky/Instagram_icon.png"
       alt="social icon"
       class="social-icon">

  <span class="social-text">
    @marek_bures78
  </span>
    </a>

    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
   target="_blank"
   class="social-card">

  <img src="../obrazky/YouTube_full-color_icon_(2017).svg.png"
       alt="social icon"
       class="social-icon">

  <span class="social-text">
    Marek Bureš
  </span>
    </a>

    <a href="https://github.com/"
       target="_blank"
       class="social-card">

      <img src="../obrazky/github-icon.svg"
           alt="social icon"
           class="social-icon">

      <span class="social-text">
        Vapik78
      </span>

    </a>

  </div>

 <form
  action="https://formspree.io/f/xaqkykrj"
  method="POST"
  class="contact-form"
  onsubmit="setTimeout(() => window.location.href='/kontakt/thanks.html', 500);"

>

  <!-- volitelné: subject v emailu -->
  <input type="hidden" name="_subject" value="Zpráva z kontaktního formuláře">

  <!-- volitelné: redirect po odeslání -->
  <input type="hidden" name="_redirect" value="https://vapik78.github.io/kontakt/thanks.html">

  <input
    type="text"
    name="name"
    placeholder="Jméno"
    required
  >

  <input
    type="email"
    name="email"
    placeholder="Email"
    required
  >

  <textarea
    name="message"
    placeholder="Zpráva..."
    required
  ></textarea>

  <button type="submit">
    POSLAT
  </button>

</form>


</section>

<footer class="footer">


  <p>
    © 2026 Marek Bureš.
    Všechna práva vyhozena z okna.
  </p>

</footer>
